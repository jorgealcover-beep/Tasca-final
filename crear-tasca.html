<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <p><b>Menú</b></p>
            <a href="index.html">Llistat d'Activitats</a>
            <a href="crear-tasca.html">Crear tasca</a>
            <a href="categories.html">Gestió de Categories</a>
        </nav>
    </header>

    <main>
        <h1>Crear Nova Tasca</h1>
        <form id="crearTasca" class="contenidor">
            <label for="titolTasca">Títol:</label>
            <input type="text" id="titolTasca" name="titol">
            <label for="descripcioTasca">Descripció:</label>
            <input type="text" id="descripcioTasca" name="descripcio">
            <label for="dataTasca">Data:</label>
            <input type="date" id="dataTasca" name="data">
            <label for="categoriaTasca">Categoria:</label>
            <select name="categoria" id="categoriaTasca"></select>
            <label for="prioritatTasca">Prioritat</label>
            <select name="prioritat" id="prioritatTasca">
                <option value="alta">Alta</option>
                <option value="mitjana">Mitjana</option>
                <option value="baixa">Baixa</option>
            </select>
            <button >Crear Tasca</button>
        </form>
    </main>
    <script src="script/tasques.js"></script>
</body>
</html>
